<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whale · Workspace</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="gate">
  <div class="gate-logo">
    <div class="gate-mark">W</div>
    <span class="gate-word">Whale</span>
  </div>

  <div class="gate-box">
    <div class="gate-title">Enter password to continue</div>
    <form id="gate-form">
      <input type="password" id="gate-input" class="gate-input" placeholder="Password" autocomplete="off" autofocus>
      <button type="submit" class="gate-btn">Enter</button>
      <div id="gate-error" class="gate-error">Incorrect password. Please try again.</div>
    </form>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
